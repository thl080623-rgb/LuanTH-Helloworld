services:
  web:
    image: odoo:19.0
    depends_on:
      - db
    ports:
      - "8069:8069"  
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
    env_file:
      - env/odoo.env
    # Gộp chung lệnh chạy config và cờ dev vào đây:
    command: odoo -c /etc/odoo/odoo.conf --dev=all

  db:
    image: postgres:16
    ports:
      - "5433:5432"  
    env_file:
      - env/postgresql.env
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    restart: on-failure
volumes:
  odoo-web-data:
    external: true
    name: helloword_odoo-web-data
  odoo-db-data:
    external: true
    name: helloword_odoo-db-data